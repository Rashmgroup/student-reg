<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* General form styles */
form {
    max-width: 600px;
    margin: auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #f9f9f9;
  }
  
  h3 {
    text-align: center;
    margin-bottom: 15px;
  }
  
  label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
  }
  
  input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  
  button.btn {
    background-color: #007BFF;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
  }
  
  button.btn:hover {
    background-color: #0056b3;
  }
  
  .navigation-btns {
    display: flex;
    justify-content: space-between;
  }
  
  .step {
    display: none;
  }
  
  .step.active {
    display: block;
  }
  
  /* File preview styles */
  #imagePreviewContainer {
    margin-top: 10px;
  }
  
  #imagePreview {
    max-width: 100px;
    max-height: 100px;
    border: 1px solid #ccc;
    border-radius: 4px;
    margin-top: 10px;
    display: block;
  }
  
  .hidden {
    display: none;
  }
  
    </style>
</head>
<body>
    <form method="POST" action="/" enctype="multipart/form-data">
        <!-- Step 1: Basic Information -->
        <div class="step active" id="step-1">
          <h3>Basic Information</h3>
          <label for="Name">Full Name</label>
          <input type="text" id="Name" name="Name" placeholder="Full Name" required><br>
      
          <label for="Fname">Father's Name</label>
          <input type="text" id="Fname" name="Fname" placeholder="Father's Name" required><br>
      
          <label for="Email">Email</label>
          <input type="email" id="Email" name="Email" placeholder="Email" required><br>
      
          <div class="navigation-btns">
            <button type="button" class="btn" onclick="nextStep(1)">Next</button>
          </div>
        </div>
      
        <!-- Step 2: Address and Contact Information -->
        <div class="step" id="step-2">
          <h3>Address and Contact Information</h3>
          <label for="Address">Address</label>
          <input type="text" id="Address" name="Address" placeholder="Address" required><br>
      
          <label for="City">City</label>
          <input type="text" id="City" name="City" placeholder="City" required><br>
      
          <label for="State">State</label>
          <input type="text" id="State" name="State" placeholder="State" required><br>
      
          <label for="Phone">Phone</label>
          <input type="text" id="Phone" name="Phone" placeholder="Phone" required><br>
      
          <label for="Whatsapp">WhatsApp Number</label>
          <input type="text" id="Whatsapp" name="Whatsapp" placeholder="WhatsApp" required><br>
      
          <label for="GuardianPhone">Guardian's Phone</label>
          <input type="text" id="GuardianPhone" name="GuardianPhone" placeholder="Guardian's Phone"><br>
      
          <div class="navigation-btns">
            <button type="button" class="btn" onclick="prevStep(2)">Back</button>
            <button type="button" class="btn" onclick="nextStep(2)">Next</button>
          </div>
        </div>
      
        <!-- Step 3: Educational Details -->
        <div class="step" id="step-3">
          <h3>Educational Details</h3>
          <label for="highschool">High School (10th)</label>
          <select id="highschool" name="highschool" required>
            <option value="">Select</option>
            <option value="Passed">Passed</option>
            <option value="Appearing">Appearing</option>
            <option value="N/A">N/A</option>
          </select><br>
      
          <label for="inter">Intermediate (12th)</label>
          <select id="inter" name="inter" required>
            <option value="">Select</option>
            <option value="Passed">Passed</option>
            <option value="Appearing">Appearing</option>
            <option value="N/A">N/A</option>
          </select><br>
      
          <label for="Graduation">Graduation</label>
          <select id="Graduation" name="Graduation" required>
            <option value="">Select</option>
            <option value="Passed">Passed</option>
            <option value="Appearing">Appearing</option>
            <option value="N/A">N/A</option>
          </select><br>
      
          <div class="navigation-btns">
            <button type="button" class="btn" onclick="prevStep(3)">Back</button>
            <button type="button" class="btn" onclick="nextStep(3)">Next</button>
          </div>
        </div>
      
        <!-- Step 4: Final Details -->
        <div class="step" id="step-4">
          <h3>Final Details</h3>
          <label for="Course">Course Applied For</label>
          <select id="Course" name="Course" required onchange="showOtherCourseField()">
            <option value="">Select</option>
            <!-- Add your course options here -->
            <option value="Other">Other</option>
          </select><br>
      
          <div id="otherCourseField" style="display: none;">
            <label for="OtherCourse">Write your choice</label>
            <input type="text" id="OtherCourse" name="OtherCourse" placeholder="Other Course">
          </div>
      
          <label for="Gender">Gender</label>
          <select id="Gender" name="Gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select><br>
      
          <!-- File Uploads -->
          <label for="photo">Upload Your Photo (Max 5MB)</label>
          <input type="file" id="photo" name="photo" accept="image/*"><br>
      
          <label for="signature">Upload Your Signature (Max 2MB)</label>
          <input type="file" id="signature" name="signature" accept="image/*"><br>
      
          <label for="documents">Upload Your Documents (10th, 12th, etc.)</label>
          <input type="file" id="documents" name="documents" accept="application/pdf,image/*" multiple><br>
      
          <label for="registrationNumber">Registration Number</label>
          <input type="text" id="registrationNumber" name="registrationNumber" placeholder="After Registration You Will Get" readonly><br>
      
          <div class="navigation-btns">
            <button type="button" class="btn" onclick="prevStep(4)">Back</button>
            <button type="submit" class="btn">Submit</button>
          </div>
        </div>
      </form>
      <script>
        // JavaScript for multi-step form navigation and file preview
document.addEventListener("DOMContentLoaded", () => {
  let currentStep = 1;

  // Function to show a specific step
  function showStep(step) {
    const steps = document.querySelectorAll(".step");
    steps.forEach((stepDiv, index) => {
      stepDiv.classList.toggle("active", index + 1 === step);
    });
  }

  // Function to go to the next step
  window.nextStep = (step) => {
    currentStep = step + 1;
    showStep(currentStep);
  };

  // Function to go to the previous step
  window.prevStep = (step) => {
    currentStep = step - 1;
    showStep(currentStep);
  };

  // Show 'Other Course' input if 'Other' is selected
  window.showOtherCourseField = () => {
    const courseSelect = document.getElementById("Course");
    const otherField = document.getElementById("otherCourseField");
    otherField.style.display = courseSelect.value === "Other" ? "block" : "none";
  };

  // Preview uploaded image
  window.previewImage = (event) => {
    const preview = document.getElementById("imagePreview");
    const file = event.target.files[0];

    if (file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    } else {
      preview.src = "#";
      preview.style.display = "none";
    }
  };

  // Initialize the first step
  showStep(currentStep);
});

      </script>
</body>
</html>
